<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTML Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #1e1e2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      background: #16161e;
      border-bottom: 1px solid #45475a;
      flex-shrink: 0;
      height: 38px;
    }
    #toolbar-title {
      color: #89b4fa;
      font-size: 13px;
      flex: 1;
    }
    #toolbar button {
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      padding: 3px 12px;
      cursor: pointer;
      border-radius: 3px;
      font-size: 12px;
      height: 26px;
      font-family: inherit;
    }
    #toolbar button:hover { background: #45475a; }
    #preview {
      flex: 1;
      border: none;
      background: #fff;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="toolbar-title">HTML Preview</span>
    <button onclick="refresh()">Refresh</button>
    <button onclick="closeWindow()">Close</button>
  </div>
  <iframe id="preview" srcdoc="" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>

  <script>
    async function loadHtml() {
      try {
        const html = await window.__TAURI_INTERNALS__.invoke('get_preview_html', {});
        document.getElementById('preview').srcdoc = html || '<p style="font-family:sans-serif;padding:20px;color:#888">No HTML content loaded.</p>';
      } catch (e) {
        console.error('Failed to load HTML:', e);
        document.getElementById('preview').srcdoc = '<p style="font-family:sans-serif;padding:20px;color:red">Error loading preview: ' + e + '</p>';
      }
    }

    function refresh() {
      loadHtml();
    }

    async function closeWindow() {
      try {
        await window.__TAURI_INTERNALS__.invoke('close_html_preview', {});
      } catch (e) {
        window.close();
      }
    }

    window.addEventListener('DOMContentLoaded', loadHtml);
  </script>
</body>
</html>
